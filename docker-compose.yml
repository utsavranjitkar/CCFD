services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ccfd-api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ccfd-network

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: ccfd-frontend
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    networks:
      - ccfd-network

networks:
  ccfd-network:
    driver: bridge
